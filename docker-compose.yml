services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rd-auto-mvp
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
    volumes:
      - rd_auto_data:/app/data
    restart: unless-stopped

volumes:
  rd_auto_data:
